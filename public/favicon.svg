<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Neobrutalist Background (Sharp & High Contrast) -->
  <rect x="32" y="32" width="448" height="448" fill="#ffffff" stroke="#000000" stroke-width="20" />
  
  <!-- Hard Shadow for the inner content -->
  <rect x="110" y="110" width="310" height="310" fill="#000000" />
  
  <!-- Main Accent Box -->
  <rect x="90" y="90" width="310" height="310" fill="#ff5a1f" stroke="#000000" stroke-width="15" />

  <!-- Mathematical Symbol (Integral) -->
  <text x="50%" y="62%" dominant-baseline="middle" text-anchor="middle" font-family="serif" font-style="italic" font-weight="bold" font-size="280" fill="#000000">∫</text>
  
  <!-- Tiny Accent Dot -->
  <rect x="340" y="340" width="40" height="40" fill="#ffff00" stroke="#000000" stroke-width="5" />
</svg>